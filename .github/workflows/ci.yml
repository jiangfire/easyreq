name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run for the same branch/ref so we don't burn minutes on
# superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  test:
    name: Unit + Integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: easyreq
          POSTGRES_PASSWORD: easyreq
          POSTGRES_DB: easyreqdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://easyreq:easyreq@localhost:5432/easyreqdb
      NEXTAUTH_SECRET: ci-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_DIR: ./uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm test

  test-s3:
    name: S3 Integration (MinIO)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: easyreq
          POSTGRES_PASSWORD: easyreq
          POSTGRES_DB: easyreqdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/minio/health/ready || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
        # Override the default MinIO entrypoint so we can pass runtime flags.
        # The minio image expects `minio server <dir> [flags]`; we use a shell
        # to combine them and pin the listen ports.
        entrypoint: ""
        command: >-
          sh -c "
          mkdir -p /data
          minio server /data --address ':9000' --console-address ':9001'
          "
    env:
      DATABASE_URL: postgresql://easyreq:easyreq@localhost:5432/easyreqdb
      NEXTAUTH_SECRET: ci-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      STORAGE_PROVIDER: s3
      S3_BUCKET: easyreq-test
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null 2>&1; then
              echo "MinIO ready"
              exit 0
            fi
            echo "Waiting for MinIO... ($i)"
            sleep 2
          done
          echo "MinIO never became ready" >&2
          exit 1
      - name: Run S3 integration tests
        run: npm run test:s3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-s3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
