name: Release

# Triggered when a maintainer pushes a tag like v0.1.0. The CI workflow still
# gates merges to main; this job only ships the binary artifact.
on:
  push:
    tags:
      - "v*.*.*"

# `contents: write` is required to publish a GitHub Release.
# `packages: write` is required to push images to ghcr.io.
permissions:
  contents: write
  packages: write

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  docker:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{sha}}
          flavor: latest=auto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Print published tags
        run: echo "${{ steps.meta.outputs.tags }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read changelog section
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found, releasing without notes."
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          # Pull the section whose header starts with `## [<version>]` or
          # `## <version>` (stripping the leading 'v'). Falls back to the
          # top-most section.
          BODY=$(awk -v v="${VERSION#v}" '
            BEGIN { capture = 0 }
            /^##[[:space:]]/ {
              if (capture) exit
              if ($0 ~ "^##[[:space:]]*\\[" v "\\]") capture = 1
              else if ($0 ~ "^##[[:space:]]+" v "[[:space:]]") capture = 1
              else if ($0 ~ "^##[[:space:]]+Unreleased") capture = 1
            }
            capture { print }
          ' CHANGELOG.md)
          {
            echo "body<<EOF"
            printf "%s" "$BODY"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
